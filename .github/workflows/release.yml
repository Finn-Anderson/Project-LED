name: Release

on:
  workflow_dispatch:

jobs:
  publish-py:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.14.x

    - name: Set up Pillow
      run: |
        pip install --upgrade pip
        pip install Pillow

    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt

    - name: Install PyInstaller
      run: |
        pip install pyinstaller

    - if: ${{ matrix.os }} == windows-latest
      shell: bash
      run: |
        echo "image_path = images/icon.png;images" >> $GITHUB_ENV

    - if: ${{ matrix.os }} != windows-latest
      shell: bash
      run: |
        echo "image_path = images/icon.png:images" >> $GITHUB_ENV

    - name: Build executable
      run: |
        pyinstaller --clean -y -n "led-app" --noconsole --onefile --add-data=$image_path --icon="images/icon.ico" led-app.py
        pyinstaller --clean -y -n "led-pi" --noconsole --onefile --add-data=$image_path --icon="images/icon.ico" led-pi.py

    - name: Upload ready files
      uses: actions/upload-artifact@v7
      with:
        name: project-led-release-${{ matrix.os }}
        path: dist/*
