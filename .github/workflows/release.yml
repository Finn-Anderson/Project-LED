name: Release

on:
  workflow_dispatch:

jobs:
  publish-py:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest

    runs-on: ${{ matrix.os }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: 3.14.x

    - name: Install dependencies
      run: >
        python -m pip install --upgrade pip

        pip install .

    - name: Install PyInstaller
      run: |
        pip install pyinstaller

    - name: Build executable
      run: |
        pyinstaller 'led-app.py'
        pyinstaller 'led-pi.py'

    - uses: actions/upload-artifact@v7
      with:
        name: project-led-release-${{ matrix.os }}
        path: install/*